<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GRAPEZ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap');

body {
    margin: 0;
    background: #f6efe6;
    font-family: 'Inter', sans-serif;
    color: #4b3a2f;
    overflow: hidden;
    height: 100vh;
}

h2 {
    text-align: center;
    margin-top: 30px;
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    letter-spacing: 8px;
    color: #3a2c24;
}

/* Setup Card */
#setup {
    display: flex;
    justify-content: center;
    margin-top: 70px;
}

.setupCard {
    background: #e8dccb;
    padding: 45px 70px;
    border-radius: 25px;
    border: 2px dashed #cbbba6;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

/* Palette */
.palette {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 25px 0;
}

.colorCircle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: 0.3s;
}

.colorCircle:hover {
    transform: scale(1.1);
}

.selected {
    border: 3px solid #4b3a2f;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
}

/* Game Layout */
.mainContainer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 90px;
    height: calc(100vh - 120px);
}

/* Board */
.boardWrapper {
    background: #e8dccb;
    padding: 25px;
    border-radius: 25px;
    border: 2px dashed #cbbba6;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

canvas {
    background: transparent;
}

/* Side Panel */
.sidePanel {
    width: 300px;
    text-align: center;
}

.resultBox {
    background: white;
    padding: 35px;
    border-radius: 22px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.07);
    min-height: 220px;
}

.resultBox h3 {
    margin-top: 0;
    font-weight: 600;
}

/* Winner Styling */
.winnerText {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    margin-top: 20px;
}

/* Restart */
.restartWrapper {
    text-align: center;
    margin-top: 20px;
}

.restartBtn {
    padding: 12px 32px;
    border-radius: 18px;
    background: #a67c52;
    color: white;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.restartBtn:hover {
    background: #8c6239;
    transform: translateY(-2px);
}

button {
    background: #a67c52;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 12px;
    cursor: pointer;
}

/* Signature */
.signature {
    position: fixed;
    bottom: 18px;
    width: 100%;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: #7a6a5f;
    opacity: 0.7;
    pointer-events: none;
}
</style>
</head>

<body>

<h2>GRAPEZ</h2>

<div id="setup">
    <div class="setupCard">
        <h3 id="selectText">Select Player 1 Color</h3>
        <div id="palette" class="palette"></div>
        <button onclick="confirmColor()">Confirm</button>
    </div>
</div>

<div class="mainContainer" id="gameLayout" style="display:none;">

    <div class="boardWrapper">
        <!-- Slightly larger board -->
        <canvas id="game" width="560" height="560"></canvas>
    </div>

    <div class="sidePanel">
        <div class="resultBox">
            <h3>Game Status</h3>
            <div id="info">Waiting to start...</div>
        </div>

        <div class="restartWrapper">
            <button class="restartBtn" onclick="restart()">Restart</button>
        </div>
    </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const rows = 6;
const radius = 28;   // 👈 slightly bigger circles

let circles = [];
let currentPlayer = 1;
let currentNumber = 1;
let gameOver = false;
let colors = {};
let colorNames = {};

let selectingPlayer = 1;
let selectedColor = null;

const pastelColors = [
    {hex:"#d8a7b1", name:"Rose"},
    {hex:"#a8c3a0", name:"Sage"},
    {hex:"#f4c2a1", name:"Peach"},
    {hex:"#c3b1e1", name:"Lavender"},
    {hex:"#e6ccb2", name:"Beige"}
];

function createPalette() {
    const palette = document.getElementById("palette");
    palette.innerHTML = "";

    pastelColors.forEach(colorObj => {
        if (!Object.values(colors).includes(colorObj.hex)) {
            const div = document.createElement("div");
            div.className = "colorCircle";
            div.style.background = colorObj.hex;

            div.onclick = () => {
                document.querySelectorAll(".colorCircle")
                    .forEach(c => c.classList.remove("selected"));
                div.classList.add("selected");
                selectedColor = colorObj;
            };

            palette.appendChild(div);
        }
    });
}

function confirmColor() {
    if (!selectedColor) return alert("Select a color");

    colors[selectingPlayer] = selectedColor.hex;
    colorNames[selectingPlayer] = selectedColor.name;

    if (selectingPlayer === 1) {
        selectingPlayer = 2;
        selectedColor = null;
        document.getElementById("selectText").innerText =
            "Select Player 2 Color";
        createPalette();
    } else {
        document.getElementById("setup").style.display = "none";
        document.getElementById("gameLayout").style.display = "flex";
        restart();
    }
}

createPalette();

class Circle {
    constructor(x, y, row, col) {
        this.x = x;
        this.y = y;
        this.row = row;
        this.col = col;
        this.number = null;
        this.owner = null;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);

        if (this.number === null && !gameOver) {
            ctx.fillStyle = "#cbbba6";
        } else if (this.number === null && gameOver) {
            ctx.fillStyle = "black";
        } else {
            ctx.fillStyle = colors[this.owner];
        }

        ctx.fill();
        ctx.strokeStyle = "#4b3a2f";
        ctx.stroke();

        if (this.number !== null) {
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 15px Inter";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.number, this.x, this.y);
        }
    }

    isClicked(mx, my) {
        let dx = mx - this.x;
        let dy = my - this.y;
        return dx * dx + dy * dy <= radius * radius;
    }
}

function createBoard() {
    circles = [];
    const pyramidHeight = rows * radius * 2;
    const verticalStart = (canvas.height - pyramidHeight) / 2;

    for (let r = 0; r < rows; r++) {
        let count = r + 1;
        let totalWidth = count * radius * 2;
        let startX = (canvas.width - totalWidth) / 2 + radius;

        for (let c = 0; c < count; c++) {
            let x = startX + c * radius * 2;
            let y = verticalStart + r * radius * 2;
            circles.push(new Circle(x, y, r, c));
        }
    }
}

function getNeighbors(circle) {
    return circles.filter(other => {
        let r = circle.row;
        let c = circle.col;
        let rr = other.row;
        let cc = other.col;

        return (
            (rr === r && Math.abs(cc - c) === 1) ||
            (rr === r - 1 && (cc === c || cc === c - 1)) ||
            (rr === r + 1 && (cc === c || cc === c + 1))
        );
    });
}

function calculateScores(blackHole) {
    let p1Nums = [];
    let p2Nums = [];

    getNeighbors(blackHole).forEach(n => {
        if (n.owner === 1) p1Nums.push(n.number);
        if (n.owner === 2) p2Nums.push(n.number);
    });

    let p1Total = p1Nums.reduce((a,b)=>a+b,0);
    let p2Total = p2Nums.reduce((a,b)=>a+b,0);

    return {p1Nums, p2Nums, p1Total, p2Total};
}

canvas.addEventListener("click", function(e) {
    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    circles.forEach(circle => {
        if (circle.isClicked(mx, my) && circle.number === null) {

            circle.number = currentNumber;
            circle.owner = currentPlayer;

            if (currentPlayer === 2) currentNumber++;
            currentPlayer = currentPlayer === 1 ? 2 : 1;

            if (currentNumber > 10) {
                gameOver = true;
                let blackHole = circles.find(c => c.number === null);
                let scores = calculateScores(blackHole);

                let winnerName;
                let winnerColor;

                if (scores.p1Total < scores.p2Total) {
                    winnerName = colorNames[1];
                    winnerColor = colors[1];
                } else if (scores.p2Total < scores.p1Total) {
                    winnerName = colorNames[2];
                    winnerColor = colors[2];
                } else {
                    winnerName = "No one";
                    winnerColor = "#4b3a2f";
                }

                document.getElementById("info").innerHTML =
                    `<div>Oh no… it's the last one.</div><br>
                     <div>${colorNames[1]}: ${scores.p1Nums.join(" + ")} = ${scores.p1Total}</div>
                     <div>${colorNames[2]}: ${scores.p2Nums.join(" + ")} = ${scores.p2Total}</div>
                     <div class="winnerText" style="color:${winnerColor}">
                        ${winnerName} Wins
                     </div>`;
            }

            draw();
        }
    });
});

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    circles.forEach(c => c.draw());

    if (!gameOver) {
        document.getElementById("info").innerHTML =
            `<div><strong style="color:${colors[currentPlayer] || '#4b3a2f'}">
                ${colorNames[currentPlayer] || "Player"}
             </strong>'s Turn</div>
             <div>Place Number: ${currentNumber}</div>`;
    }
}    

function restart() {
    currentPlayer = 1;
    currentNumber = 1;
    gameOver = false;
    createBoard();
    draw();
}
</script>

<div class="signature">by styxx</div>

</body>
</html>
